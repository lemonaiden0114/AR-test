<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>웹 AR 3D 뷰어</title>
  
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.0.0/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }

    header {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 1.2rem;
    }

    model-viewer {
      width: 100%;
      height: 70vh;
      background-color: #ffffff;
      --poster-color: transparent;
    }

    .ar-button {
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      cursor: pointer;
    }

    .ar-button:active {
      background-color: #0056b3;
    }

    #ar-prompt {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      display: none;
      font-size: 14px;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <header>
    벽면에 우주인 발 붙이기
  </header>

  <!-- orientation 속성을 추가하여 모델을 90도 숙이게 만듭니다 -->
  <model-viewer 
    id="viewer"
    src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" 
    alt="우주인 3D 모델" 
    orientation="90deg 0deg 0deg" 
    ar 
    ar-modes="webxr scene-viewer" 
    ar-placement="wall" 
    ar-scale="fixed"
    camera-controls 
    auto-rotate 
    shadow-intensity="1">
    
    <button slot="ar-button" class="ar-button">
      📷 카메라로 벽에 붙이기
    </button>
    
    <div id="ar-prompt" slot="ar-prompt">
      벽을 천천히 비춘 후, 원하는 곳을 터치하세요!
    </div>
  </model-viewer>

  <script>
    const modelViewer = document.querySelector('#viewer');
    const arPrompt = document.querySelector('#ar-prompt');

    modelViewer.addEventListener('ar-status', (event) => {
      if (event.detail.status === 'session-started') {
        modelViewer.style.opacity = '0'; 
        arPrompt.style.display = 'block'; 
      } else if (event.detail.status === 'not-presenting') {
        modelViewer.style.opacity = '1';
        arPrompt.style.display = 'none';
      }
    });

    modelViewer.addEventListener('click', (event) => {
      if (modelViewer.style.opacity === '0') {
        modelViewer.style.opacity = '1'; 
        arPrompt.style.display = 'none'; 
      }
    });
  </script>

</body>
</html>
