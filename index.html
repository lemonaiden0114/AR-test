<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- 스마트폰 캐시 방지를 위한 메타 태그 추가 (우주인이 다시 뜨는 것 방지) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>웹 AR 3D 뷰어</title>
  
  <!-- model-viewer 웹 컴포넌트 불러오기 -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.0.0/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }

    header {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 1.2rem;
    }

    model-viewer {
      width: 100%;
      height: 70vh;
      background-color: #ffffff;
      --poster-color: transparent;
    }

    /* AR 진입 버튼 (초록색 톤) */
    .ar-button {
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      cursor: pointer;
    }

    .ar-button:active {
      background-color: #388E3C;
    }

    /* AR 화면 내 안내 문구 */
    #ar-prompt {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      display: none;
      font-size: 14px;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <header>
    내 화분(Planter) AR로 보기
  </header>

  <!-- 화분 모델(planter.glb)을 바닥에 배치하도록 설정 -->
  <model-viewer 
    id="viewer"
    src="planter.glb" 
    alt="화분 3D 모델" 
    ar 
    ar-modes="webxr scene-viewer" 
    ar-placement="floor" 
    ar-scale="fixed"
    camera-controls 
    auto-rotate 
    shadow-intensity="1">
    
    <button slot="ar-button" class="ar-button">
      📷 카메라로 바닥에 놓기
    </button>
    
    <div id="ar-prompt" slot="ar-prompt">
      바닥이나 책상을 천천히 비춘 후, 원하는 곳을 터치하세요!
    </div>
  </model-viewer>

  <script>
    const modelViewer = document.querySelector('#viewer');
    const arPrompt = document.querySelector('#ar-prompt');

    // AR 모드 시작 시 모델을 일시적으로 숨김
    modelViewer.addEventListener('ar-status', (event) => {
      if (event.detail.status === 'session-started') {
        modelViewer.style.opacity = '0'; 
        arPrompt.style.display = 'block'; 
      } else if (event.detail.status === 'not-presenting') {
        modelViewer.style.opacity = '1';
        arPrompt.style.display = 'none';
      }
    });

    // 화면 터치 시 화분이 나타남
    modelViewer.addEventListener('click', (event) => {
      if (modelViewer.style.opacity === '0') {
        modelViewer.style.opacity = '1'; 
        arPrompt.style.display = 'none'; 
      }
    });
  </script>

</body>
</html>
