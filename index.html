<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>웹 AR 3D 뷰어</title>
  
  <!-- model-viewer 웹 컴포넌트 불러오기 -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.0.0/model-viewer.min.js"></script>

  <style>
    /* 전체 화면 여백 제거 및 배경색 설정 */
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }

    /* 상단 제목 바 스타일 */
    header {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 1.2rem;
    }

    /* 모델 뷰어 영역 크기 설정 */
    model-viewer {
      width: 100%;
      height: 70vh; /* 화면 높이의 70% 사용 */
      background-color: #ffffff;
      --poster-color: transparent;
    }

    /* 커스텀 AR 버튼 스타일 */
    .ar-button {
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      cursor: pointer;
    }

    .ar-button:active {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <header>
    책상 위 AR 모델 띄우기
  </header>

  <!-- 3D 모델 뷰어 세팅 (수정된 부분) -->
  <model-viewer 
    src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" 
    alt="우주인 3D 모델" 
    ar 
    ar-modes="scene-viewer webxr" 
    ar-placement="floor" 
    ar-scale="fixed"
    camera-controls 
    auto-rotate 
    shadow-intensity="1">
    
    <!-- AR 진입 버튼 -->
    <button slot="ar-button" class="ar-button">
      📷 카메라로 책상에 띄우기
    </button>
    
  </model-viewer>

  <div style="text-align: center; padding: 20px; color: #666;">
    <p>화면을 터치해서 모델을 돌려보거나,<br>위 버튼을 눌러 실제 공간에 배치해보세요!</p>
  </div>

</body>
</html>
